  const deposits = filtered.filter(t => t.type === "deposit");
  const totalOut = withdrawals.reduce((s,t) => s+t.amount, 0);
  const totalIn = deposits.reduce((s,t) => s+t.amount, 0);

  const expenseByRecipient = useMemo(() => {
    const map = {};
    withdrawals.forEach(t => {
      const info = CATEGORIES[t.desc] || {name:t.desc,category:"อื่นๆ",icon:"📄",color:"#78909C"};
      const isOther = info.category === "อื่นๆ";
      const key = isOther ? "__others__" : info.name;
      if (!map[key]) map[key] = isOther ? {name:"อื่นๆ",category:"อื่นๆ",icon:"📄",color:"#78909C",total:0,count:0,transactions:[],subItems:[]} : {...info,total:0,count:0,transactions:[]};

      if (isOther && !map[key].subItems.find(s => s.name === info.name)) map[key].subItems.push({name: info.name});

    return Object.values(map).sort((a,b) => b.total-a.total);
  }, [withdrawals]);

    deposits.forEach(t => {

      const info = DEPOSITOR_INFO[key] || {name:t.desc,role:"",color:"#78909C",icon:"📄"};

      map[key].total += t.amount; map[key].count++; map[key].transactions.push(t);
    });
    return Object.values(map).sort((a,b) => b.total-a.total);
  }, [deposits]);

    const map = {};

      const info = CATEGORIES[t.desc] || {name:t.desc,category:"อื่นๆ",icon:"📄",color:"#78909C"};
      const key = info.category;
      if (!map[key]) map[key] = {category:key,icon:info.icon,color:info.color,total:0,count:0,items:[]};

    });

    let cum = 0;
    return expenseByCategory.map((cat,i) => { const pct=cat.total/totalOut; const s=cum; cum+=pct*360; return {...cat,pct,startAngle:s,endAngle:cum,arcColor:CAT_COLORS[i%CAT_COLORS.length]}; });
  }, [expenseByCategory, totalOut]);

    const inv = depositByPerson.filter(p => p.key !== "interest");
    const tot = inv.reduce((s,p) => s+p.total, 0);
    let cum = 0;
    return inv.map(p => { const pct=p.total/tot; const s=cum; cum+=pct*360; return {...p,pct,startAngle:s,endAngle:cum}; });

            </div>
          </div>

            {tabs.map(tab => (

            ))}

              <div style={{position:"absolute",top:-30,right:-30,width:100,height:100,background:`radial-gradient(circle,${card.color}12,transparent 70%)`,borderRadius:"50%",animation:"glow 3s ease-in-out infinite"}} />
              <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>{card.icon} {card.label}</div>
              <div className="mono" style={{fontSize:24,fontWeight:700,letterSpacing:"-0.03em",background:card.gradient,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>฿{fmt(card.value)}</div>
              <div style={{fontSize:11,color:"#475569",marginTop:4}}>{card.sub}</div>
            </div>
          ))}
        </div>

        {/* OVERVIEW */}
        {activeTab === "overview" && (
          <div className="card fade-up" style={{padding:24}}>
            <h3 style={{fontSize:16,fontWeight:800,marginBottom:20,color:"#f1f5f9"}}>สัดส่วนค่าใช้จ่ายตามประเภท</h3>
            <div style={{display:"flex",gap:32,alignItems:"flex-start",flexWrap:"wrap"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
                <svg viewBox="0 0 220 220" width="220" height="220">
                  {donutData.map((d,i) => d.pct < 0.003 ? null : <path key={i} d={describeArc(110,110,78,d.startAngle+1.5,d.endAngle-1.5)} fill="none" stroke={d.arcColor} strokeWidth="28" strokeLinecap="round" />)}
                  <text x="110" y="100" textAnchor="middle" fill="#94a3b8" fontSize="11" fontWeight="600" fontFamily="Sarabun,sans-serif">เบิกจ่ายรวม</text>
                  <text x="110" y="122" textAnchor="middle" fill="#f1f5f9" fontSize="18" fontWeight="800" fontFamily="JetBrains Mono,monospace">฿{fmtShort(totalOut)}</text>
                </svg>
                <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:16,justifyContent:"center",maxWidth:220}}>
                  {donutData.map((d,i) => <span key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#94a3b8"}}><span style={{width:8,height:8,borderRadius:2,background:d.arcColor,display:"inline-block"}} />{d.category}</span>)}
                </div>
              </div>
              <div style={{flex:1,minWidth:280}}>
                {expenseByCategory.map((cat,i) => (
                  <div key={cat.category} className="slide-in" style={{animationDelay:`${i*0.06}s`,padding:"14px 0",borderBottom:i<expenseByCategory.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{width:10,height:10,borderRadius:3,background:CAT_COLORS[i%CAT_COLORS.length],display:"inline-block",flexShrink:0}} />
                        <span style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>{cat.icon} {cat.category}</span>
                      </div>
                      <span className="mono" style={{fontSize:15,fontWeight:700,color:CAT_COLORS[i%CAT_COLORS.length]}}>฿{fmt(cat.total)}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                      <div style={{flex:1,height:6,background:"rgba(255,255,255,0.04)",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",borderRadius:3,background:`linear-gradient(90deg,${CAT_COLORS[i%CAT_COLORS.length]},${CAT_COLORS[i%CAT_COLORS.length]}88)`,width:`${(cat.total/totalOut)*100}%`,animation:"growBar 0.8s ease-out",transformOrigin:"left"}} />
                      </div>
                      <span className="mono" style={{fontSize:11,color:"#64748b",minWidth:40,textAlign:"right"}}>{((cat.total/totalOut)*100).toFixed(1)}%</span>
                    </div>
                    <div style={{fontSize:11,color:"#64748b",paddingLeft:18}}>{cat.items.map(it => it.name).join(", ")}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* EXPENSES */}
        {activeTab === "expenses" && (
          <div className="fade-up">
            <div className="card" style={{padding:24,marginBottom:16}}>
              <h3 style={{fontSize:16,fontWeight:800,marginBottom:4,color:"#f1f5f9"}}>💸 รายละเอียดรายจ่ายตามผู้รับเงิน</h3>
              <p style={{fontSize:12,color:"#64748b",marginBottom:20}}>คลิกที่รายการเพื่อดูรายละเอียด</p>
              {expenseByRecipient.map((r,i) => (
                <div key={r.name+i} className="slide-in" style={{animationDelay:`${i*0.05}s`,marginBottom:8}}>
                  <div className="row-hover" onClick={() => setExpandedRecipient(expandedRecipient===r.name?null:r.name)} style={{background:"rgba(255,255,255,0.02)",borderRadius:12,border:expandedRecipient===r.name?`1px solid ${r.color}40`:"1px solid rgba(255,255,255,0.04)",padding:"14px 16px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:18}}>{r.icon}</span><span style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>{r.name}</span></div>
                        <span className="tag" style={{background:`${r.color}18`,color:r.color}}>{r.category}</span>
                        {r.subItems && r.subItems.length > 0 && <div style={{fontSize:10,color:"#64748b",marginTop:4}}>{r.subItems.map(s=>s.name).join(", ")}</div>}
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div className="mono" style={{fontSize:17,fontWeight:700,color:"#ef4444"}}>฿{fmt(r.total)}</div>
                        <div style={{fontSize:11,color:"#64748b"}}>{r.count} ครั้ง · {((r.total/totalOut)*100).toFixed(1)}%</div>
                      </div>
                    </div>
                    <div style={{marginTop:10,height:4,background:"rgba(255,255,255,0.04)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:`linear-gradient(90deg,${r.color},${r.color}80)`,borderRadius:2,width:`${(r.total/totalOut)*100}%`,animation:"growBar 0.8s ease-out",transformOrigin:"left"}} /></div>
                  </div>
                  {expandedRecipient===r.name && (
                    <div style={{background:"rgba(0,0,0,0.2)",borderRadius:"0 0 12px 12px",padding:"10px 16px",marginTop:-4,border:`1px solid ${r.color}20`,borderTopColor:"transparent"}}>
                      {r.transactions.map((t,j) => (
                        <div key={j} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:j<r.transactions.length-1?"1px solid rgba(255,255,255,0.03)":"none"}}>
                          <span className="mono" style={{fontSize:11,color:"#94a3b8",minWidth:72}}>{t.date}</span>
                          <span style={{fontSize:11,color:"#94a3b8",flex:1,marginLeft:8}}>{t.recipientName||t.desc}</span>
                          <span style={{fontSize:10,color:"#475569",marginRight:8}}>{t.channel}</span>
                          <span className="mono" style={{fontSize:12,fontWeight:600,color:"#f87171"}}>฿{fmt(t.amount)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))}
            </div>
            <div style={{background:"linear-gradient(135deg,rgba(99,102,241,0.08),rgba(139,92,246,0.04))",border:"1px solid rgba(99,102,241,0.15)",borderRadius:16,padding:20}}>
              <h4 style={{fontSize:14,fontWeight:800,color:"#a5b4fc",marginBottom:10}}>💡 สรุปค่าใช้จ่าย</h4>
              <div style={{fontSize:13,color:"#cbd5e1",lineHeight:1.8}}>
                <p><strong style={{color:"#F39C12"}}>ค่าก่อสร้าง</strong> — Eureka + สัปทวี + คุณอัครฤทธิ์ รวม ~฿2.40M (44.7%)</p>
                <p style={{marginTop:4}}><strong style={{color:"#E74C3C"}}>ค่าประกันเช่า/ประกันบริการ</strong> — J Lifestyle ~฿2.28M (42.6%)</p>
                <p style={{marginTop:4}}><strong style={{color:"#3498DB"}}>ค่าบริหารจัดการ</strong> — Meisaku Group ~฿345K (6.4%)</p>
                <p style={{marginTop:4}}><strong style={{color:"#9B59B6"}}>ค่าออกแบบ Interior Design</strong> — Paramount ~฿200K (3.7%)</p>
                <p style={{marginTop:4}}><strong style={{color:"#1ABC9C"}}>ค่า Media Package</strong> — Appservation ฿107K (2.0%)</p>
              </div>
            </div>
          </div>
        )}

        {/* INVESTMENTS */}
        {activeTab === "investments" && (
          <div className="fade-up">
            <div style={{background:"linear-gradient(135deg,rgba(16,185,129,0.08),rgba(6,78,59,0.12))",border:"1px solid rgba(16,185,129,0.15)",borderRadius:16,padding:"28px 24px",marginBottom:16,textAlign:"center"}}>
              <div style={{fontSize:12,color:"#6ee7b7",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>💰 เงินลงทุนจากกรรมการทั้งหมด</div>
              <div className="mono" style={{fontSize:40,fontWeight:800,letterSpacing:"-0.03em",background:"linear-gradient(135deg,#10b981,#6ee7b7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>฿{fmt(totalIn)}</div>
              <div style={{fontSize:12,color:"#64748b",marginTop:6}}>{deposits.length} รายการ · พ.ย. 2568 — มี.ค. 2569</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
              {depositByPerson.filter(p => p.key !== "interest").map((p,i) => {
                const invTotal = depositByPerson.filter(x => x.key !== "interest").reduce((s,x) => s+x.total, 0);
                const pct = (p.total/invTotal)*100;
                return (
                  <div key={p.name} className="card fade-up" style={{animationDelay:`${i*0.1}s`,padding:20,position:"relative",overflow:"hidden"}}>
                    <div style={{position:"absolute",top:-40,right:-40,width:120,height:120,background:`radial-gradient(circle,${p.color}10,transparent 70%)`,borderRadius:"50%"}} />
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                      <div style={{width:42,height:42,borderRadius:12,background:`${p.color}15`,border:`1px solid ${p.color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{p.icon}</div>
                      <div>
                        <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>{p.name}</div>
                        <div style={{fontSize:11,color:"#64748b"}}>{p.role}</div>
                        {p.note && <div style={{fontSize:10,color:"#475569",marginTop:2}}>{p.note}</div>}
                      </div>
                    </div>
                    <div className="mono" style={{fontSize:24,fontWeight:700,marginBottom:6,background:`linear-gradient(135deg,${p.color},${p.color}cc)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>฿{fmt(p.total)}</div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:"#64748b"}}>{p.count} ครั้ง</span><span className="mono" style={{fontSize:12,fontWeight:700,color:p.color}}>{pct.toFixed(1)}%</span></div>
                    <div style={{height:4,background:"rgba(255,255,255,0.04)",borderRadius:2,marginTop:8,overflow:"hidden"}}><div style={{height:"100%",background:p.color,borderRadius:2,width:`${pct}%`,animation:"growBar 1s ease-out",transformOrigin:"left"}} /></div>
                  </div>
                );
              })}
            </div>
            <div className="card fade-up" style={{animationDelay:"0.2s",padding:24,display:"flex",gap:24,alignItems:"center",marginBottom:16}}>
              <svg viewBox="0 0 200 200" width="160" height="160" style={{flexShrink:0}}>
                {investorDonut.map((d,i) => <path key={i} d={describeArc(100,100,70,d.startAngle+2,d.endAngle-2)} fill="none" stroke={d.color} strokeWidth="28" strokeLinecap="round" />)}
                <text x="100" y="95" textAnchor="middle" fill="#94a3b8" fontSize="9" fontWeight="600" fontFamily="Sarabun">สัดส่วน</text>
                <text x="100" y="112" textAnchor="middle" fill="#e2e8f0" fontSize="10" fontWeight="700" fontFamily="Sarabun">เงินลงทุน</text>
              </svg>
              <div style={{flex:1}}>
                <h3 style={{fontSize:14,fontWeight:800,marginBottom:12,color:"#f1f5f9"}}>สัดส่วนการลงทุน</h3>
                {investorDonut.map((d,i) => (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <span style={{width:12,height:12,borderRadius:4,background:d.color,flexShrink:0,boxShadow:`0 0 8px ${d.color}40`}} />
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{d.name}</div><div className="mono" style={{fontSize:11,color:"#64748b"}}>฿{fmt(d.total)}</div></div>
                    <span className="mono" style={{fontSize:14,fontWeight:800,color:d.color}}>{(d.pct*100).toFixed(1)}%</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="card fade-up" style={{animationDelay:"0.25s",padding:24}}>
              <h3 style={{fontSize:15,fontWeight:800,marginBottom:16,color:"#f1f5f9"}}>📅 ไทม์ไลน์เงินลงทุน</h3>
              {deposits.filter(t => t.desc !== "Interest Deposit").map((t,i) => {
                const key = DEPOSITOR_MAP(t); const info = DEPOSITOR_INFO[key];
                return (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                    <span className="mono" style={{fontSize:11,color:"#64748b",minWidth:72}}>{t.date}</span>
                    <span style={{width:8,height:8,borderRadius:"50%",background:info.color,flexShrink:0,boxShadow:`0 0 8px ${info.color}60`}} />
                    <span style={{fontSize:12,fontWeight:600,color:"#cbd5e1",flex:1}}>{info.name}</span>
                    <span style={{fontSize:10,color:"#475569"}}>{t.channel}</span>
                    <span className="mono" style={{fontSize:13,fontWeight:700,color:"#10b981",minWidth:100,textAlign:"right"}}>+฿{fmt(t.amount)}</span>
                  </div>
                );
              })}
            </div>
            <div style={{background:"linear-gradient(135deg,rgba(16,185,129,0.08),rgba(6,78,59,0.04))",border:"1px solid rgba(16,185,129,0.12)",borderRadius:16,padding:20,marginTop:16}}>
              <h4 style={{fontSize:14,fontWeight:800,color:"#6ee7b7",marginBottom:10}}>📌 รูปแบบการลงทุน</h4>
              <div style={{fontSize:13,color:"#cbd5e1",lineHeight:1.8}}>
                <p>กรรมการทั้ง 2 ท่านโอนเงินเข้าเป็นคู่ทุกครั้ง — คุณดุสิตโอนผ่าน General Master Advisory (TTB X2888) และ KBank (X8135) ส่วนคุณพิชสินีโอนผ่าน KBank (X9097/X0879) จากนั้นเบิกจ่ายออกทันทีในวันเดียวกัน</p>
                <p style={{marginTop:6}}>เดือน ก.พ. 69 มียอดลงทุนสูงสุด เนื่องจากค่าก่อสร้าง Eureka Engineering ฿1.62M และค่าก่อสร้าง Saptawee ฿674K</p>
              </div>
            </div>
          </div>
        )}

        {/* TRANSACTIONS */}
        {activeTab === "transactions" && (
          <div className="card fade-up" style={{padding:20,overflow:"hidden"}}>
            <h3 style={{fontSize:15,fontWeight:800,marginBottom:14,color:"#f1f5f9"}}>📋 รายการทั้งหมด ({filtered.length} รายการ)</h3>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{borderBottom:"2px solid rgba(255,255,255,0.08)"}}>
                  {["วันที่","รายละเอียด","ประเภท","เงินเข้า","เงินออก"].map(h => <th key={h} style={{padding:"10px 12px",textAlign:h==="เงินเข้า"||h==="เงินออก"?"right":"left",color:"#475569",fontWeight:700,fontSize:11,whiteSpace:"nowrap",textTransform:"uppercase",letterSpacing:"0.05em"}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {filtered.map((t,i) => {
                    const isW = t.type==="withdrawal";
                    let dn,cl,dc;
                    if(isW){const info=CATEGORIES[t.desc]||{name:t.desc,category:"อื่นๆ",color:"#78909C"};dn=info.name;cl=info.category;dc=info.color;}
                    else{const key=DEPOSITOR_MAP(t);const info=DEPOSITOR_INFO[key]||{name:t.desc,role:"",color:"#78909C"};dn=info.name;cl=info.role;dc=info.color;}
                    return (
                      <tr key={i} className="row-hover" style={{borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                        <td className="mono" style={{padding:"10px 12px",color:"#94a3b8",whiteSpace:"nowrap",fontSize:11}}>{t.date}</td>
                        <td style={{padding:"10px 12px"}}><div style={{fontWeight:600,color:"#e2e8f0",fontSize:12}}>{dn}</div><div style={{fontSize:10,color:"#475569",marginTop:1}}>{t.detail}</div></td>
                        <td style={{padding:"10px 12px"}}><span className="tag" style={{background:`${dc}15`,color:dc}}>{cl}</span></td>
                        <td className="mono" style={{padding:"10px 12px",textAlign:"right",color:"#10b981",fontWeight:600}}>{!isW?`+฿${fmt(t.amount)}`:""}</td>
                        <td className="mono" style={{padding:"10px 12px",textAlign:"right",color:"#ef4444",fontWeight:600}}>{isW?`−฿${fmt(t.amount)}`:""}</td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot><tr style={{borderTop:"2px solid rgba(255,255,255,0.08)"}}>
                  <td colSpan="3" style={{padding:12,fontWeight:800,color:"#94a3b8",fontSize:12}}>รวมทั้งหมด</td>
                  <td className="mono" style={{padding:12,textAlign:"right",fontWeight:800,color:"#10b981",fontSize:14}}>+฿{fmt(totalIn)}</td>
                  <td className="mono" style={{padding:12,textAlign:"right",fontWeight:800,color:"#ef4444",fontSize:14}}>−฿{fmt(totalOut)}</td>
                </tr></tfoot>
              </table>
            </div>
          </div>
        )}

        <div style={{textAlign:"center",padding:"32px 0 16px",fontSize:11,color:"#334155"}}>Meisaku Holding Dashboard · Bank Statement Analysis · ข้อมูล ณ 1 มี.ค. 2569</div>
      </div>
    </div>
  );
}

ReactDOM.render(<Dashboard />, document.getElementById("root"));
</script>
</body>
</html>
